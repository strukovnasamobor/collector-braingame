name = "collector-game-backend"
main = "src/index.js"
compatibility_date = "2026-04-28"

[vars]
FIREBASE_PROJECT_ID = "collector-braingame"

[triggers]
# "* * * * *"   — every minute: sweep stale games, refresh bot queue heartbeats.
# "0 0 * * SAT" — Saturday 00:00 UTC: purge all games older than 7 days.
crons = ["* * * * *", "0 0 * * SAT"]

# Per-user, per-endpoint sliding-window limit. Key is `${uid}:${pathname}`, so each endpoint
# has its own budget for each authenticated caller. 120 / 60s = 2 req/s sustained; legitimate
# play (heartbeats every 10s, moves a few times per minute, matchmaking polls every 3s) stays
# well under this, while a spammer is throttled before they amplify Firestore costs.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 120, period = 60 }

# Durable Object class hosting the per-game bot driver. One instance per
# active bot game, named by gameId. Reachable only via the binding —
# no public route is registered.
[[durable_objects.bindings]]
name = "MATCH_BOT"
class_name = "MatchBot"

[[migrations]]
tag = "v1-matchbot"
# Free Workers plan requires SQLite-backed DO classes (error 10097 if you use
# `new_classes` here without the paid Workers tier). The state.storage API
# (put/get/deleteAll/setAlarm) is identical between the two backends, so the
# MatchBot code doesn't change.
new_sqlite_classes = ["MatchBot"]
